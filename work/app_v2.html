<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-title" content="進路診断v2">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🎓%3C/text%3E%3C/svg%3E">
  <title>進路診断v2</title>
  <style>
/* ============================ RESET & BASE ============================ */
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-card-hi: #334155;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --primary: #6366f1;
  --primary-hi: #818cf8;
  --primary-soft: rgba(99, 102, 241, 0.16);
  --accent: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --border: #334155;
  --border-hi: #475569;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
  --tap: 44px;
}
html { -webkit-text-size-adjust: 100%; height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ============================ HEADER ============================ */
.app-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.app-title {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.5px;
}
.back-btn, .ghost-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  min-height: 36px;
}
.back-btn:hover, .ghost-btn:hover { background: var(--bg-card); color: var(--text); }
.back-btn[hidden], .ghost-btn[hidden] { display: none; }

/* ============================ MAIN ============================ */
main {
  flex: 1;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  padding: 16px;
}
.screen { animation: fade 0.2s ease-out; }
.screen[hidden] { display: none; }
@keyframes fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================ HERO ============================ */
.hero {
  text-align: center;
  padding: 32px 20px;
  background: linear-gradient(140deg, var(--bg-card), var(--bg-card-hi));
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.hero-icon {
  font-size: 56px;
  margin-bottom: 8px;
  filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.5));
}
.hero h2 { margin: 8px 0 12px; font-size: 22px; line-height: 1.4; }
.hero-sub { color: var(--text-dim); font-size: 14px; margin: 0 0 24px; }
.cta-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

/* ============================ BUTTONS ============================ */
.primary-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  min-height: var(--tap);
  flex: 1 1 0;
  min-width: 140px;
  transition: background 0.15s;
}
.primary-btn:hover { background: var(--primary-hi); }
.primary-btn:active { transform: scale(0.98); }
.primary-btn:disabled { background: var(--bg-card-hi); cursor: not-allowed; opacity: 0.6; }

.secondary-btn {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-hi);
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  min-height: var(--tap);
  flex: 1 1 0;
  min-width: 140px;
}
.secondary-btn:hover { background: var(--bg-card); }

/* ============================ INFO CARDS ============================ */
.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.info-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 16px 8px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.info-num { font-size: 26px; font-weight: 700; color: var(--primary-hi); }
.info-label { font-size: 12px; color: var(--text-dim); }
.data-credit { text-align: center; color: var(--text-muted); font-size: 11px; margin: 8px 0; }

/* ============================ DIAGNOSTIC FLOW ============================ */
.step-indicator {
  display: inline-block;
  background: var(--primary-soft);
  color: var(--primary-hi);
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 16px;
}
.step-title { font-size: 22px; margin: 0 0 4px; }
.step-sub { color: var(--text-dim); font-size: 13px; margin: 0 0 24px; }

.nav-row {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  position: sticky;
  bottom: 0;
  padding: 12px 0;
  background: linear-gradient(180deg, transparent, var(--bg) 30%);
}

/* ============================ HYOUTEI SLIDER ============================ */
.hyoutei-wrap {
  background: var(--bg-card);
  padding: 24px 20px;
  border-radius: var(--radius);
  text-align: center;
}
.hyoutei-display {
  font-size: 72px;
  font-weight: 700;
  color: var(--primary-hi);
  line-height: 1;
  margin-bottom: 24px;
  letter-spacing: -2px;
}
.hyoutei-display::after { content: ""; font-size: 24px; color: var(--text-dim); }
#hyouteiInput {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  background: var(--bg-card-hi);
  border-radius: 3px;
  outline: none;
}
#hyouteiInput::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  background: var(--primary);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 0 6px var(--primary-soft);
}
#hyouteiInput::-moz-range-thumb {
  width: 28px;
  height: 28px;
  background: var(--primary);
  border-radius: 50%;
  cursor: pointer;
  border: none;
}
.hyoutei-marks {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}
.hyoutei-hint {
  margin-top: 16px;
  padding: 10px;
  background: var(--primary-soft);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--primary-hi);
  min-height: 40px;
}

/* ============================ CHIPS ============================ */
.chip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
}
.chip {
  background: var(--bg-card);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 14px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  min-height: var(--tap);
  transition: all 0.15s;
}
.chip:hover { border-color: var(--border-hi); }
.chip.selected {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary-hi);
  font-weight: 600;
}

/* ============================ RADIO ============================ */
.radio-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.radio-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.radio-row:hover { border-color: var(--border-hi); }
.radio-row:has(input:checked) {
  background: var(--primary-soft);
  border-color: var(--primary);
}
.radio-row input { margin-top: 4px; accent-color: var(--primary); }
.radio-row span { font-size: 14px; }
.radio-row strong { display: block; font-size: 15px; margin-bottom: 2px; }
.radio-row span:not(strong) { color: var(--text-dim); font-size: 13px; }

/* ============================ RESULTS ============================ */
.result-summary {
  background: var(--bg-card);
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  border-left: 4px solid var(--primary);
}
.result-summary h2 { margin: 0 0 8px; font-size: 18px; }
.result-summary .conditions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.result-summary .cond-tag {
  background: var(--bg-card-hi);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
}
.result-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

/* ============================ UNI LIST ============================ */
.uni-list { display: flex; flex-direction: column; gap: 12px; }
.uni-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
}
.uni-card:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow); }
.uni-card-main { min-width: 0; }
.uni-name { font-size: 17px; font-weight: 600; margin: 0 0 4px; }
.uni-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.region-badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  color: white;
}
.meta-tag {
  display: inline-block;
  background: var(--bg-card-hi);
  color: var(--text-dim);
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 11px;
}
.meta-tag.trending {
  background: rgba(245, 158, 11, 0.18);
  color: var(--accent);
  font-weight: 600;
}
.meta-tag.shitei {
  background: rgba(255, 215, 0, 0.18);
  color: #ffd700;
  font-weight: 700;
}
.trending-inline {
  color: var(--accent);
  font-weight: 600;
  font-size: 12px;
  margin-left: 6px;
}
.shitei-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  margin: 12px 0;
  padding: 10px 12px;
  background: var(--bg-card-hi);
  border: 2px dashed var(--border-hi);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.shitei-toggle:hover { border-color: var(--accent); color: var(--text); }
.shitei-toggle.flagged {
  background: rgba(255, 215, 0, 0.12);
  border-color: #ffd700;
  border-style: solid;
  color: #ffd700;
}
.shitei-toggle .star { font-size: 18px; }
.shitei-toggle .text { flex: 1; text-align: left; }

.shitei-panel {
  background: var(--bg-card);
  border-left: 3px solid var(--border-hi);
  padding: 14px;
  border-radius: var(--radius-sm);
  margin-top: 8px;
}
.shitei-panel.flagged {
  border-left-color: #ffd700;
  background: rgba(255, 215, 0, 0.05);
}
.shitei-panel .shitei-status {
  font-size: 14px;
  margin: 0 0 12px;
}
.shitei-panel h5 {
  font-size: 13px;
  margin: 12px 0 8px;
  color: var(--text);
}
.checklist {
  list-style: none;
  padding: 0;
  margin: 0;
}
.checklist li {
  position: relative;
  padding: 8px 8px 8px 32px;
  margin-bottom: 4px;
  background: var(--bg-card-hi);
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
}
.checklist li::before {
  content: '☐';
  position: absolute;
  left: 10px;
  top: 8px;
  color: var(--text-dim);
  font-size: 14px;
}
.shitei-note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 12px;
  margin-bottom: 0;
  line-height: 1.5;
}
.uni-reason {
  font-size: 13px;
  color: var(--text-dim);
  margin: 0;
  line-height: 1.5;
}
.uni-reason ul { margin: 4px 0 0; padding-left: 18px; }
.uni-reason li { margin-bottom: 2px; }

.match-score {
  text-align: center;
  background: var(--primary-soft);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  min-width: 64px;
}
.match-score .num { font-size: 22px; font-weight: 700; color: var(--primary-hi); display: block; line-height: 1; }
.match-score .label { font-size: 10px; color: var(--text-dim); display: block; margin-top: 2px; }
.match-score.grade-S { background: rgba(245, 158, 11, 0.16); }
.match-score.grade-S .num { color: var(--accent); }
.match-score.grade-A { background: rgba(16, 185, 129, 0.16); }
.match-score.grade-A .num { color: var(--success); }
.match-score.grade-S\+ {
  background: linear-gradient(135deg, rgba(245, 158, 11, 0.25), rgba(255, 215, 0, 0.2));
  box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
}
.match-score.grade-S\+ .num { color: #ffd700; }

/* ============================ FILTERS ============================ */
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
.filter-row select, .filter-row input {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 16px; /* 16px未満だとiOS Safariがフォーカス時に強制ズームする */
  min-height: var(--tap);
}

/* ============================ DETAIL ============================ */
.detail-header {
  background: var(--bg-card);
  padding: 20px;
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.detail-header h2 { margin: 0 0 8px; font-size: 22px; }
.detail-header .meta-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 14px;
  font-size: 13px;
  margin-top: 12px;
}
.detail-header .meta-grid dt { color: var(--text-dim); }
.detail-header .meta-grid dd { margin: 0; }

.tab-row {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  -webkit-overflow-scrolling: touch;
}
.tab {
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab.active {
  color: var(--primary-hi);
  border-bottom-color: var(--primary);
}

.tab-content { padding-bottom: 24px; }
.tab-content h3 { font-size: 16px; margin: 0 0 12px; color: var(--primary-hi); }
.tab-content h4 { font-size: 14px; margin: 16px 0 6px; color: var(--text); }
.tab-content table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin: 8px 0;
}
.tab-content th, .tab-content td {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.tab-content th { color: var(--text-dim); font-weight: 500; width: 30%; }
.tab-content p { font-size: 14px; color: var(--text-dim); margin: 6px 0; }
.tab-content .note { background: var(--bg-card); padding: 12px; border-radius: var(--radius-sm); font-size: 13px; margin: 8px 0; border-left: 3px solid var(--accent); }
.tab-content .empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 13px;
}
.tab-content .method-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 12px;
  border-left: 3px solid var(--primary);
}
.tab-content .method-card h4 { margin-top: 0; color: var(--primary-hi); }

.rating-bar {
  display: grid;
  grid-template-columns: 110px 1fr 28px;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}
.rating-bar .label { color: var(--text-dim); }
.rating-bar .bar { background: var(--bg-card-hi); border-radius: 4px; height: 8px; overflow: hidden; }
.rating-bar .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-hi));
  border-radius: 4px;
  transition: width 0.4s;
}
.rating-bar .num { text-align: right; font-weight: 600; }

.dept-list, .method-list { display: flex; flex-direction: column; gap: 10px; }
.dept-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.dept-card .dept-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.dept-card .dept-name { font-weight: 600; font-size: 14px; }
.dept-card .hensachi { font-size: 13px; color: var(--accent); font-weight: 600; }
.dept-card .dept-meta { font-size: 12px; color: var(--text-dim); }
.qualif-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.qualif-tag { background: var(--bg-card-hi); padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--text-dim); }

/* ============================ LOADING ============================ */
.loading-wrap { text-align: center; padding: 80px 20px; }
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--bg-card-hi);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.data-status { color: var(--text-muted); font-size: 12px; }

/* ============================ UNKNOWN TOGGLE ============================ */
.unknown-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px dashed var(--border-hi);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.unknown-toggle:has(input:checked) {
  background: rgba(148, 163, 184, 0.1);
  border-style: solid;
  border-color: var(--text-dim);
  color: var(--text);
}
.unknown-toggle input { accent-color: var(--text-dim); }
.hyoutei-wrap.unknown .hyoutei-display { opacity: 0.4; }
.hyoutei-wrap.unknown #hyouteiInput { opacity: 0.4; }
.hensachi-quick-btn.disabled, #hensachiInput.disabled, #hensachiInput:disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ============================ HENSACHI GUIDE ============================ */
.hensachi-quick-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.hensachi-quick-btn {
  background: var(--bg-card);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  min-height: var(--tap);
}
.hensachi-quick-btn:hover { border-color: var(--border-hi); }
.hensachi-quick-btn.selected {
  background: var(--primary-soft);
  border-color: var(--primary);
}
.hensachi-quick-btn .qb-main {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.hensachi-quick-btn .qb-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.hensachi-quick-btn.selected .qb-sub { color: var(--primary-hi); }
.hensachi-input-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  padding: 16px 20px;
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.hensachi-input-wrap label { font-size: 14px; color: var(--text); }
#hensachiInput {
  width: 100px;
  padding: 8px 12px;
  background: var(--bg);
  border: 2px solid var(--primary);
  color: var(--text);
  border-radius: var(--radius-sm);
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  -moz-appearance: textfield;
}
#hensachiInput::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

/* ============================ WARNING BANNER ============================ */
.warning-banner {
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.35);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: 12px 0 4px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
}
.warning-banner strong { color: var(--accent); }

    <section class="screen" data-screen="diag-hensachi" hidden>
      <h2>偏差値・模試</h2>
      <label>偏差値 <input id="hensachiInput" type="number" min="30" max="80" value="50"></label>
      <label><input id="hensachiUnknownChk" type="checkbox"> わからない</label>
      <div>模試:
        <select id="examSourceSel">
          <option value="kawai">河合</option><option value="shinken">進研</option>
          <option value="sundai">駿台</option><option value="toshin">東進</option>
        </select>
      </div>
      <button class="primary-btn" data-next="diag-area">次へ</button>
    </section>

    <section class="screen" data-screen="diag-area" hidden>
      <h2>エリア</h2>
      <div id="regionChips" class="chip-wrap"></div>
      <label><input id="commuteOnlyChk" type="checkbox"> 通学できる大学だけ</label>
      <button class="primary-btn" data-next="diag-interest">次へ</button>
    </section>

    <section class="screen" data-screen="diag-interest" hidden>
      <h2>興味・希望</h2>
      <h3>興味のある分野</h3><div id="interestChips" class="chip-wrap"></div>
      <h3>希望する就職系統</h3><div id="careerChips" class="chip-wrap"></div>
      <h3>使える入試方式</h3>
      <div class="chip-wrap">
        <label><input type="checkbox" class="em" value="sogo">総合型</label>
        <label><input type="checkbox" class="em" value="koubo">学校推薦</label>
        <label><input type="checkbox" class="em" value="ippan" checked>一般</label>
        <label><input type="checkbox" class="em" value="kyotsu" checked>共テ利用</label>
      </div>
      <button class="primary-btn" data-next="diag-riasec">次へ</button>
    </section>

    <section class="screen" data-screen="loading" hidden><p>診断中…</p></section>
    <section class="screen" data-screen="result" hidden>
      <div id="resultSummary"></div>
      <div id="resultBody"></div>
    </section>
  </main>

  <!-- インライン用プレースホルダ（build_v2.js が置換） -->
  <script type="application/json" id="inlineData">{}</script>
  <script type="application/json" id="inlineRiasecDef">{}</script>
  <script type="application/json" id="inlineRiasecMap">{}</script>
  <script id="engineSrc">/* engine_v2.js source injected here */</script>

  <script>
  'use strict';
  // ---- engine 取り込み（module を shim して評価）----
  function loadEngine() {
    const src = document.getElementById('engineSrc').textContent;
    const module = { exports: {} };
    new Function('module', 'exports', src)(module, module.exports);
    return module.exports;
  }
  function loadJSON(id) { return JSON.parse(document.getElementById(id).textContent); }

  let ENGINE, DATA, RIASEC_DEF, RIASEC_MAP;

  const state = {
    hensachi: 50,
    hensachiUnknown: false,
    examSource: 'kawai',            // kawai/shinken/sundai/toshin
    regions: new Set(),
    commuteOnly: false,
    interests: new Set(),
    careers: new Set(),
    examMethods: new Set(['ippan', 'kyotsu']),
    riasecAnswers: {},              // {index: 0..3}
    screen: 'home',
    history: [],
    lastResult: null,
    currentDept: null,
  };

  function go(screenId, opts = {}) {
    const next = document.querySelector(`.screen[data-screen="${screenId}"]`);
    if (!next) { console.warn('no screen', screenId); return; }
    const cur = document.querySelector(`.screen[data-screen="${state.screen}"]`);
    if (cur) cur.hidden = true;
    if (!opts.back) state.history.push(state.screen);
    state.screen = screenId;
    next.hidden = false;
    const back = document.getElementById('backBtn');
    back.hidden = state.history.length === 0;
    window.scrollTo(0, 0);
  }
  function goBack() {
    if (!state.history.length) return;
    const prev = state.history.pop();
    const cur = document.querySelector(`.screen[data-screen="${state.screen}"]`);
    if (cur) cur.hidden = true;
    const p = document.querySelector(`.screen[data-screen="${prev}"]`);
    if (p) p.hidden = false;
    state.screen = prev;
    document.getElementById('backBtn').hidden = state.history.length === 0;
  }

  function makeChip(container, id, label, set) {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'chip'; b.textContent = label;
    b.setAttribute('aria-pressed', set.has(id) ? 'true' : 'false');
    b.addEventListener('click', () => {
      if (set.has(id)) { set.delete(id); b.setAttribute('aria-pressed', 'false'); b.classList.remove('on'); }
      else { set.add(id); b.setAttribute('aria-pressed', 'true'); b.classList.add('on'); }
    });
    container.appendChild(b);
  }

  function buildInputScreens() {
    // エリア（data_v2.regions が配列 or universities から抽出）
    const regionList = Array.isArray(DATA.regions) && DATA.regions.length
      ? DATA.regions.map(r => (typeof r === 'string' ? { id: r, label: r } : r))
      : [...new Set(DATA.universities.map(u => u.region))].map(r => ({ id: r, label: r }));
    const rc = document.getElementById('regionChips');
    regionList.forEach(r => makeChip(rc, r.id, r.label || r.id, state.regions));

    const ic = document.getElementById('interestChips');
    DATA.tags.interest.forEach(t => makeChip(ic, t.id, t.label, state.interests));
    const cc = document.getElementById('careerChips');
    DATA.tags.employment.forEach(t => makeChip(cc, t.id, t.label, state.careers));
  }

  function init() {
    ENGINE = loadEngine();
    DATA = loadJSON('inlineData');
    RIASEC_DEF = loadJSON('inlineRiasecDef');
    RIASEC_MAP = loadJSON('inlineRiasecMap');
    const nUni = (DATA.universities || []).length;
    const nDept = (DATA.departments || []).length;
    document.getElementById('homeStats').textContent =
      (nUni && nDept) ? `${nUni}大学 / ${nDept}学部から診断` : 'データ未読み込み';
    document.getElementById('startBtn').addEventListener('click', () => go('diag-hensachi'));
    document.getElementById('backBtn').addEventListener('click', goBack);

    buildInputScreens();
    document.getElementById('hensachiInput').addEventListener('input', e => { state.hensachi = Number(e.target.value); });
    document.getElementById('hensachiUnknownChk').addEventListener('change', e => { state.hensachiUnknown = e.target.checked; });
    document.getElementById('examSourceSel').addEventListener('change', e => { state.examSource = e.target.value; });
    document.getElementById('commuteOnlyChk').addEventListener('change', e => { state.commuteOnly = e.target.checked; });
    document.querySelectorAll('[data-next]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.getAttribute('data-next') === 'diag-riasec') {
          state.examMethods = new Set([...document.querySelectorAll('.em')].filter(x => x.checked).map(x => x.value));
        }
        go(btn.getAttribute('data-next'));
      });
    });
  }
  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
